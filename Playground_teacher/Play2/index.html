<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="../bootstrap/css/bootstrap.css" rel="stylesheet">

    <title>Hello, world!</title>

    <style>
      [class^="col"] {
        background-color: lightgrey;
        border: 1px solid black;
      }

    </style>
  </head>

        <!-- debug section -->
        <section class="bg-warning">
          <h1 class="d-sm-none">Break: Extra small</h1>

          <h1 class="d-none d-md-block d-lg-none">Break md: Medium</h1>
          <h1 class="d-none d-lg-block d-xl-none">Break lg: Large</h1>

        </section>


        <h1>Hello, world!</h1>

        <div class="row">
          <div class="col-2">
            1 of 2
          </div>
          <div class="col">
            2 of 2

        </div>

          <div class="col">
            1 of 3
          </div>
